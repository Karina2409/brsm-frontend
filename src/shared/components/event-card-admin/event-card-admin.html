<div
    [routerLink]="['/events', event().eventId]"
    class="group flex cursor-pointer flex-col rounded-xl border border-slate-200 bg-white p-5 transition-all hover:border-[var(--p-primary-300)] hover:shadow-lg active:scale-[0.98]">
    <div class="mb-4 flex items-start justify-between gap-3">
        <h3
            class="line-clamp-2 text-base leading-snug font-bold text-slate-800 transition-colors group-hover:text-[var(--p-primary-700)]">
            {{ event().name }}
        </h3>
        <div class="flex shrink-0 items-center gap-2">
            @if (event().forPetition) {
                <span
                    class="w-fit rounded bg-green-50 px-1.5 py-0.5 text-[10px] font-bold text-green-600 uppercase ring-1 ring-green-200">
                    В ходатайство
                </span>
            }
            <span
                class="shrink-0 rounded-md bg-[var(--p-primary-50)] px-2 py-1 text-[11px] font-black tracking-tight text-[var(--p-primary-700)] ring-1 ring-[var(--p-primary-200)] ring-inset">
                {{ event().optCount }} ОПТ
            </span>
        </div>
    </div>

    <div class="grid grid-cols-1 gap-2 text-sm text-slate-600">
        <div class="flex items-center gap-2">
            <i class="pi pi-map-marker w-4 text-[var(--p-primary-400)]"></i>
            <span class="truncate">{{ event().place }}</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <i class="pi pi-calendar w-4 text-slate-400"></i>
                <span>{{ event().date | relativeDate }}</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="pi pi-clock w-4 text-slate-400"></i>
                <span>{{ event() | eventTime }}</span>
            </div>
        </div>
    </div>

    <div class="my-4 border-t border-slate-100"></div>

    <div class="space-y-2">
        <div class="flex justify-between text-[11px] font-bold tracking-wider text-slate-500 uppercase">
            <span class="flex items-center gap-1"> <i class="pi pi-users text-[10px]"></i> Запись </span>
            <span class="text-slate-700">{{ 4 }} / {{ event().studentCount }}</span>
        </div>
        <div class="h-2 w-full overflow-hidden rounded-full bg-slate-100">
            <div
                class="h-full bg-[var(--p-primary-500)] shadow-[0_0_8px_rgba(var(--p-primary-500-rgb),0.4)] transition-all duration-500"
                [style.width.%]="(4 / event().studentCount) * 100"></div>
        </div>
    </div>

    <div class="mt-5 flex items-center justify-between border-t border-slate-50 pt-4">
        <span
            class="text-xs font-bold tracking-widest text-slate-400 uppercase transition-colors group-hover:text-[var(--p-primary-500)]">
            Подробнее
        </span>
        <i
            class="pi pi-chevron-right text-slate-300 transition-transform group-hover:translate-x-1 group-hover:text-[var(--p-primary-400)]"></i>
    </div>
</div>
