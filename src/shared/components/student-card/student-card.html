<div class="group flex items-center justify-between gap-4 rounded-2xl border border-slate-100 bg-white p-3 md:p-4 transition-all hover:border-[var(--p-primary-200)] hover:shadow-md cursor-pointer select-none">

    <div class="flex items-center gap-4 flex-1 min-w-0">
        <div class="relative h-12 w-12 shrink-0 overflow-hidden rounded-full border-2 border-slate-50 bg-slate-50 transition-transform group-hover:scale-105 duration-200">
            @if (studentInfo()?.photo) {
                <img [src]="studentInfo()?.photo" class="h-full w-full object-cover" alt="Фото студента" />
            } @else {
                <div class="flex h-full w-full items-center justify-center bg-slate-100 text-slate-300">
                    <i class="pi pi-user text-xl"></i>
                </div>
            }
        </div>

        <div class="flex-1 min-w-0 pr-4">
            <p class="truncate text-base font-black tracking-tight text-slate-800 group-hover:text-[var(--p-primary-600)] transition-colors">
                {{ studentInfo()?.surname }} {{ studentInfo()?.name }} {{ studentInfo()?.patronymic }}
            </p>
            <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-0.5">
                <span class="text-[10px] font-extrabold uppercase tracking-widest text-slate-400 flex items-center gap-1.5">
                    <i class="pi pi-id-card text-[10px]"></i>
                    Группа {{ studentInfo()?.groupNumber }}
                </span>
                <span class="h-3.5 w-[1px] bg-slate-100 hidden sm:inline"></span>
                <span class="text-[10px] font-extrabold tracking-widest text-[var(--p-primary-500)] uppercase">
                    {{studentInfo()?.faculty}}
                </span>
            </div>
        </div>
    </div>

    <div class="flex items-center gap-6 shrink-0">
        <div class="flex flex-col items-end sm:items-center">
            <span class="text-[9px] uppercase font-black text-slate-300 tracking-wider">Мероприятия</span>
            <span class="text-sm font-black text-slate-700 group-hover:text-[var(--p-primary-600)]">
                {{ studentInfo()?.eventsCount || 0 }}
            </span>
        </div>

        <div class="hidden sm:flex h-8 w-8 items-center justify-center rounded-full bg-slate-50 text-slate-400 group-hover:bg-[var(--p-primary-50)] group-hover:text-[var(--p-primary-500)] transition-all">
            <i class="pi pi-chevron-right text-xs group-hover:translate-x-0.5 transition-transform"></i>
        </div>
    </div>
</div>
