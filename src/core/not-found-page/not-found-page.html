<div class="relative flex min-h-[85vh] flex-col items-center justify-center overflow-hidden px-6 py-12">
    <div class="absolute top-1/4 left-1/2 -z-10 h-72 w-72 -translate-x-1/2 rounded-full bg-[var(--p-primary-50)] opacity-50 blur-3xl md:h-96 md:w-96"></div>
    <div class="absolute bottom-1/4 left-1/3 -z-10 h-64 w-64 rounded-full bg-blue-50 opacity-30 blur-3xl"></div>

    <div class="w-full max-w-md text-center animate-[fadeIn_0.4s_ease-out]">
        <h1 class="bg-gradient-to-b from-[var(--p-primary-500)] to-blue-700 bg-clip-text text-8xl font-black tracking-tighter text-transparent md:text-9xl">
            404
        </h1>

        <div class="relative mx-auto my-6 flex h-20 w-20 items-center justify-center rounded-2xl border border-slate-100 bg-white shadow-sm">
            <i class="pi pi-compass text-3xl text-[var(--p-primary-500)] animate-spin [animation-duration:10s]"></i>
            <i class="pi pi-sparkles absolute -top-1 -right-1 text-base text-amber-400"></i>
        </div>

        <h3 class="text-xl font-black tracking-tight text-slate-800 md:text-2xl">
            Страница не найдена
        </h3>
        <p class="mt-3 mb-8 text-sm font-medium leading-relaxed text-slate-500">
            Упс! Похоже, запрашиваемый адрес не существует, или у вас нет прав на просмотр этой страницы. Проверьте правильность ссылки.
        </p>

        <p-button
            label="Вернуться на главную"
            icon="pi pi-home"
            severity="primary"
            size="small"
            styleClass="px-6 py-2.5 rounded-xl font-bold shadow-lg shadow-blue-100"
            (onClick)="goHome()" />
    </div>
</div>
