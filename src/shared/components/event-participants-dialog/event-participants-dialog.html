<p-dialog
    header="Записанные студенты"
    [(visible)]="visible"
    [modal]="true"
    [style]="{ width: '50vw' }"
    [breakpoints]="{ '1199px': '75vw', '575px': '95vw' }"
    [draggable]="false"
    [resizable]="false">

    <div class="py-2">
        @if (loading()) {
            <div class="flex flex-col items-center justify-center py-10 gap-3">
                <i class="pi pi-spin pi-spinner text-3xl text-[var(--p-primary-500)]"></i>
                <p class="text-slate-400 text-sm font-medium">Загрузка списка...</p>
            </div>
        } @else if (participants().length > 0) {
            <p-table [value]="participants()" [scrollable]="true" scrollHeight="400px" class="p-datatable-sm">
                <ng-template pTemplate="header">
                    <tr>
                        <th class="bg-slate-50 text-slate-500 font-bold text-[11px] uppercase">Студент</th>
                        <th class="bg-slate-50 text-slate-500 font-bold text-[11px] uppercase">Группа</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-student>
                    <tr class="border-b border-slate-50">
                        <td class="py-3 font-semibold text-slate-700">{{ student.fullName }}</td>
                        <td class="py-3 text-slate-500">{{ student.groupName }}</td>
                    </tr>
                </ng-template>
            </p-table>
        } @else {
            <div class="py-10 text-center">
                <i class="pi pi-users text-slate-200 text-4xl mb-3"></i>
                <p class="text-slate-400">На это мероприятие ещё никто не записался</p>
            </div>
        }
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-between items-center w-full border-t border-slate-50 pt-4">
            <span class="text-xs text-slate-400 font-medium">
                Всего: {{ participants().length }} чел.
            </span>
            <div class="flex gap-2">
                <p-button
                    label="Закрыть"
                    severity="secondary"
                    [text]="true"
                    (onClick)="visible.set(false)" />
                <p-button
                    label="Полный список"
                    icon="pi pi-external-link"
                    size="small"
                    [routerLink]="['/events', eventId(), 'participants']"
                    (onClick)="visible.set(false)" />
            </div>
        </div>
    </ng-template>
</p-dialog>
