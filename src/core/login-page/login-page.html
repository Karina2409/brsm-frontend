<div class="flex min-h-screen items-center justify-center">
    <div class="w-full max-w-md rounded-2xl border border-gray-200 bg-white p-8 shadow-xl">
        <h1 class="mb-6 text-center text-2xl font-bold">Авторизация</h1>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
            <input
                type="text"
                formControlName="login"
                placeholder="Логин"
                class="rounded-lg border px-4 py-3 focus:ring-2 focus:ring-blue-600 focus:outline-none" />

            <input
                type="password"
                formControlName="password"
                placeholder="Пароль"
                class="rounded-lg border px-4 py-3 focus:ring-2 focus:ring-blue-600 focus:outline-none" />

            <button type="submit" class="rounded-lg bg-blue-900 py-3 text-white transition hover:bg-blue-800">
                Войти
            </button>
        </form>
    </div>
</div>
