<div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8 border border-gray-200">
        <h1 class="text-2xl font-bold text-center mb-6">Авторизация</h1>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
            <input
                type="login"
                formControlName="login"
                placeholder="Логин"
                class="border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-600"
            />

            <input
                type="password"
                formControlName="password"
                placeholder="Пароль"
                class="border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-600"
            />

            <button type="submit" class="bg-blue-900 text-white py-3 rounded-lg hover:bg-blue-800 transition">
                Войти
            </button>
        </form>
    </div>
</div>
